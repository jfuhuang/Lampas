<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Lampas">
  <defs>
    <radialGradient id="sky" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#1c2650"/>
      <stop offset="55%" stop-color="#0b1030"/>
      <stop offset="100%" stop-color="#05070f"/>
    </radialGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe6b8" stop-opacity="0.9"/>
      <stop offset="45%" stop-color="#ffc978" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#ffb347" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="source" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff6e6"/>
      <stop offset="38%" stop-color="#ffe1a8"/>
      <stop offset="100%" stop-color="#ffcf7a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="caught" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff8ea"/>
      <stop offset="55%" stop-color="#ffdf9c"/>
      <stop offset="100%" stop-color="#ffcf7a" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="2.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="badgeClip">
      <rect x="4" y="4" width="192" height="192" rx="44"/>
    </clipPath>
  </defs>

  <!-- night badge -->
  <rect x="4" y="4" width="192" height="192" rx="44" fill="url(#sky)"/>

  <g clip-path="url(#badgeClip)">
    <!-- constellation: other players hidden in the dark -->
    <g stroke="#3f5bd0" stroke-width="1" opacity="0.4">
      <line x1="34" y1="50" x2="28" y2="112"/>
      <line x1="168" y1="64" x2="174" y2="122"/>
    </g>
    <g fill="#cdd8ff">
      <circle cx="34" cy="50" r="2.2" opacity="0.85"/>
      <circle cx="28" cy="112" r="1.8" opacity="0.7"/>
      <circle cx="168" cy="64" r="2" opacity="0.8"/>
      <circle cx="174" cy="122" r="1.6" opacity="0.65"/>
      <circle cx="150" cy="152" r="2.3" opacity="0.75"/>
      <circle cx="44" cy="150" r="1.7" opacity="0.6"/>
    </g>

    <!-- the beam / lambda cone -->
    <path d="M100 55 L58 172 L142 172 Z" fill="url(#beam)"/>
    <!-- crisp lambda legs -->
    <g stroke="#ffd891" stroke-width="3.2" stroke-linecap="round" fill="none" filter="url(#glow)">
      <line x1="100" y1="53" x2="59" y2="170"/>
      <line x1="100" y1="53" x2="141" y2="170"/>
    </g>

    <!-- a hider caught in the light -->
    <circle cx="100" cy="150" r="10" fill="url(#caught)"/>
    <circle cx="100" cy="150" r="3.4" fill="#fff6e2"/>

    <!-- the lamp / light source -->
    <circle cx="100" cy="46" r="24" fill="url(#source)" filter="url(#glow)"/>
    <circle cx="100" cy="46" r="5" fill="#fff8ec"/>
  </g>

  <!-- rim -->
  <rect x="4.75" y="4.75" width="190.5" height="190.5" rx="43.25" fill="none" stroke="#2b3768" stroke-width="1.5"/>
</svg>
